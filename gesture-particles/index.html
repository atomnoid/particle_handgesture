<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Gesture Particles</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:
radial-gradient(circle at center,#111827,#05070d 70%);
font-family:
Inter,
system-ui,
sans-serif;
}

#app{
position:relative;
width:100vw;
height:100vh;
overflow:hidden;
}

/* Hidden webcam */
#webcam{
position:absolute;
width:1px;
height:1px;
opacity:0;
pointer-events:none;
}

/* Three canvas */

#three-canvas{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:block;
}

/* Beautiful Status Panel */

#status{

position:absolute;

top:25px;

left:25px;

padding:15px 20px;

border-radius:18px;

background:rgba(255,255,255,.08);

border:1px solid rgba(255,255,255,.15);

backdrop-filter:blur(18px);

color:white;

z-index:1000;

min-width:280px;

box-shadow:

0 8px 30px rgba(0,0,0,.35);

}

#status h3{

font-size:15px;

margin-bottom:8px;

font-weight:600;

letter-spacing:.5px;

}

#status p{

font-size:13px;

opacity:.8;

}

.status-dot{

display:inline-block;

width:10px;

height:10px;

border-radius:50%;

background:#ffb100;

box-shadow:

0 0 10px #ffb100,

0 0 20px #ffb100;

margin-right:8px;

}

.ready .status-dot{

background:#00ff84;

box-shadow:

0 0 12px #00ff84,

0 0 25px #00ff84;

}

.error .status-dot{

background:#ff3b3b;

box-shadow:

0 0 12px #ff3b3b,

0 0 25px #ff3b3b;

}

/* Finger */

#finger-dot{

position:fixed;

width:28px;

height:28px;

border-radius:50%;

background:#00f0ff;

pointer-events:none;

transform:translate(-50%,-50%);

z-index:9999;

box-shadow:

0 0 15px #00f0ff,

0 0 35px #00f0ff,

0 0 70px rgba(0,240,255,.7);

transition:
transform .03s linear;

}

/* Inner Glow */

#finger-dot::after{

content:"";

position:absolute;

inset:6px;

border-radius:50%;

background:white;

opacity:.9;

}

/* FPS */

#fps{

position:absolute;

bottom:25px;

left:25px;

padding:10px 18px;

border-radius:15px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(12px);

border:1px solid rgba(255,255,255,.12);

color:white;

font-size:13px;

z-index:1000;

}

</style>

</head>

<body>

<div id="app">

<video
id="webcam"
autoplay
playsinline
muted></video>

<canvas id="three-canvas"></canvas>

<div id="status">

<h3>

<span class="status-dot"></span>

Gesture Tracker

</h3>

<p id="status-text">

Initializing camera...

</p>

</div>

<div id="fps">

MediaPipe Ready

</div>

</div>

<div id="finger-dot"></div>

<script
type="module"
src="/src/main.js"></script>

</body>

</html>
